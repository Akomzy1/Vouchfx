# Fly.io configuration for the VouchFX listener worker.
#
# This is an ALWAYS-ON worker (long-lived MTProto connections) — it must never
# be auto-stopped, so it exposes no public HTTP service. Health is monitored
# via a machine check against the internal /health endpoint.
#
# Deploy from the repo root (the Docker build needs the whole workspace):
#   flyctl deploy -c apps/listener/fly.toml

app = "vouchfx-listener"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  HEALTH_PORT = "3002"

# Secrets — set via: flyctl secrets set KEY=value -a vouchfx-listener
# Required: TELEGRAM_API_ID, TELEGRAM_API_HASH, ENCRYPTION_KEY,
#           SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, REDIS_URL
# Optional: SENTRY_DSN, ADMIN_EMAILS, RESEND_API_KEY

[checks]
  [checks.health]
    type = "http"
    port = 3002
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[restart]]
  policy = "always"
