# Fly.io configuration for the VouchFX executor worker.
#
# This is an ALWAYS-ON worker (BullMQ consumer + MetaApi connections) — it must
# never be auto-stopped, so it exposes no public HTTP service. Health is
# monitored via a machine check against the internal /health endpoint.
#
# Deploy from the repo root (the Docker build needs the whole workspace):
#   flyctl deploy -c apps/executor/fly.toml

app = "vouchfx-executor"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  HEALTH_PORT = "3001"

# Secrets — set via: flyctl secrets set KEY=value -a vouchfx-executor
# Required: ANTHROPIC_API_KEY, METAAPI_TOKEN,
#           SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY,
#           REDIS_URL, ENCRYPTION_KEY
# Optional: JBLANKED_API_KEY, SENTRY_DSN, ADMIN_EMAILS, RESEND_API_KEY

[checks]
  [checks.health]
    type = "http"
    port = 3001
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[restart]]
  policy = "always"
